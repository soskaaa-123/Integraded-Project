<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integrated Project</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#0f0f1a;
    color:white;
}

/* NAV */
nav {
    position:fixed;
    top:0;
    width:100%;
    background:#111;
    padding:15px;
    display:flex;
    justify-content:center;
    gap:20px;
    z-index:1000;
}

.nav-item {
    cursor:pointer;
    padding:10px 15px;
    border-radius:20px;
}

.nav-item:hover {
    background:#333;
}

/* DROPDOWN */
.dropdown {
    display:none;
    position:absolute;
    top:50px;
    background:#222;
    padding:10px;
    border-radius:10px;
}

.dropdown.show {
    display:block;
}

.dropdown-item {
    padding:10px;
    cursor:pointer;
}

.dropdown-item:hover {
    background:#444;
}

/* PAGES */
.page {
    display:none;
    padding-top:100px;
}

.page.active {
    display:block;
}

/* HOME */
.home-page {
    text-align:center;
}

.members-box {
    margin-top:30px;
}

/* BUTTON */
.start-btn {
    margin-top:20px;
    padding:15px 25px;
    border:none;
    background:purple;
    color:white;
    border-radius:20px;
    cursor:pointer;
}

/* EXPAND */
#subjects-wrapper {
    max-height:0;
    overflow:hidden;
    transition:0.5s;
}

#subjects-wrapper.expanded {
    max-height:500px;
}

.subject-preview-card {
    background:#222;
    padding:20px;
    margin:10px;
    cursor:pointer;
    border-radius:10px;
}

.subject-preview-card:hover {
    background:#444;
}

/* SOCIAL */
.image-showcase {
    width:100%;
    max-width:400px;
    margin:10px;
}

.table-container {
    margin-top:20px;
}

table {
    width:100%;
    border-collapse:collapse;
}

td, th {
    border:1px solid white;
    padding:10px;
}
</style>

</head>

<body>

<nav>
<div class="nav-item" onclick="showPage('home')">Menu</div>

<div class="nav-item" onclick="toggleSubjects(event)">
Subjects
<div class="dropdown" id="subjects-dropdown">
<div class="dropdown-item" onclick="showPage('english')">English</div>
<div class="dropdown-item" onclick="showPage('math')">Math</div>
<div class="dropdown-item" onclick="showPage('arabic')">Arabic</div>
<div class="dropdown-item" onclick="showPage('social')">Social</div>
</div>
</div>

<div class="nav-item" onclick="showPage('social')">Social</div>
</nav>

<!-- HOME -->

<div id="home" class="page active">
<div class="home-page">

<h1>Integrated Project</h1>

<div class="members-box">
<p>Group Members:</p>
<p>Selim, Hamza, Malak, Rokaya</p>
</div>

<button onclick="toggleExpand()" class="start-btn">
Expand Subjects ⬇
</button>

<div id="subjects-wrapper">
<div style="display:grid; grid-template-columns:repeat(2,1fr);">

<div class="subject-preview-card" onclick="showPage('english')">English</div>
<div class="subject-preview-card" onclick="showPage('math')">Math</div>
<div class="subject-preview-card" onclick="showPage('arabic')">Arabic</div>
<div class="subject-preview-card" onclick="showPage('social')">Social</div>

</div>
</div>

</div>
</div>

<!-- SUBJECT PAGES -->

<div id="english" class="page"><h1>English</h1></div>
<div id="math" class="page"><h1>Math</h1></div>
<div id="arabic" class="page"><h1>Arabic</h1></div>

<!-- SOCIAL -->

<div id="social" class="page">
<h1>Social Studies</h1>

<!-- MIXED IMAGES -->

<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/80/World_map_-_low_resolution.svg/800px-World_map_-_low_resolution.svg.png" class="image-showcase">

<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/People_network.svg/800px-People_network.svg.png" class="image-showcase">

<!-- TABLE -->

<div class="table-container">
<table>
<tr>
<th>Topic</th>
<th>Details</th>
</tr>

<tr>
<td>Community</td>
<td>People working together</td>
</tr>

<tr>
<td>World</td>
<td>Countries connected</td>
</tr>

<tr>
<td>Culture</td>
<td>Different traditions</td>
</tr>

</table>
</div>

</div>

<script>

/* PAGE SWITCH */
function showPage(pageId) {
document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
document.getElementById(pageId).classList.add('active');
}

/* DROPDOWN */
function toggleSubjects(e) {
e.stopPropagation();
document.getElementById("subjects-dropdown").classList.toggle("show");
}

document.addEventListener("click", () => {
document.getElementById("subjects-dropdown").classList.remove("show");
});

/* EXPAND */
function toggleExpand() {
document.getElementById("subjects-wrapper").classList.toggle("expanded");
}

</script>

</body>
</html>
